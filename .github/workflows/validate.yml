name: Validate n8n Stack

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow JSON files
        run: bash scripts/validate-workflows.sh

      - name: Validate docker compose
        run: docker compose -f docker-compose.local.yml config >/dev/null

      - name: Validate shell syntax
        run: |
          bash -n scripts/healthcheck.sh
          bash -n scripts/import-workflows.sh
          bash -n scripts/validate-workflows.sh
          bash -n scripts/validate-secrets.sh

      - name: Validate secret placeholders
        run: bash scripts/validate-secrets.sh
