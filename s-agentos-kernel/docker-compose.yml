# ============================================================================
# S/ AgentOS Kernel v0.1.3 — Docker Compose
# ============================================================================
# Description: Docker Compose configuration for deploying n8n with
#              PostgreSQL on a VPS. Part of the AgentOS Kernel infrastructure.
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Run: docker compose up -d
#   3. Access n8n at http://YOUR_SERVER_IP:5678
#
# Prerequisites:
#   - Docker Engine 20.10+ and Docker Compose v2+
#   - A VPS with at least 2 CPU cores, 4GB RAM, 20GB SSD
#   - Ports 5678 and 5432 available (or customize in .env)
#
# Production Notes:
#   - This compose file is suitable for single-node deployment
#   - For high availability, consider Docker Swarm or Kubernetes
#   - Always use HTTPS in production (see reverse proxy section below)
#   - Enable firewall rules to restrict port access
# ============================================================================

services:
  # ==========================================================================
  # n8n — Workflow Automation Platform
  # ==========================================================================
  # n8n is the execution engine for AgentOS workflows. It receives webhook
  # calls from the command gateway, orchestrates agent execution, and
  # persists state to the internal PostgreSQL database.
  #
  # Web UI:        http://YOUR_SERVER_IP:5678
  # Webhooks:      http://YOUR_SERVER_IP:5678/webhook/...
  # Health check:  http://YOUR_SERVER_IP:5678/healthz
  # ==========================================================================
  n8n:
    # Pinned to 1.84.0 for stability. Update after testing new versions.
    # Check releases at: https://github.com/n8n-io/n8n/releases
    image: docker.n8n.io/n8nio/n8n:1.84.0
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # All n8n and database configuration is loaded from the .env file.
      # See .env.example for the full list of required variables.
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_PORT=${N8N_PORT}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=${DB_POSTGRESDB_PORT}
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD}

      # AgentOS runtime variables consumed by Code nodes and optional integrations.
      # These must be passed into the n8n container; defining them only in .env
      # is not enough unless they are listed here.
      - S_AGENTOS_KERNEL_VERSION=${S_AGENTOS_KERNEL_VERSION}
      - S_AGENTOS_OPERATOR_KEY=${S_AGENTOS_OPERATOR_KEY}
      - S_AGENTOS_API_TOKEN=${S_AGENTOS_API_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      # Persistent volume for n8n data (workflows, credentials, executions).
      # This MUST be a named volume or bind mount to prevent data loss.
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentos_network

  # ==========================================================================
  # PostgreSQL — n8n Internal Database
  # ==========================================================================
  # This PostgreSQL instance is dedicated to n8n's internal storage:
  # workflows, credentials, execution history, and settings.
  #
  # NOTE: This is SEPARATE from Supabase (which hosts AgentOS operating memory).
  #       Supabase connects via the SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY
  #       environment variables inside n8n workflows.
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      # Persistent volume for PostgreSQL data.
      # Stores all n8n workflows, credentials, and execution logs.
      # Never delete this volume unless you have a backup.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentos_network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  # n8n_data: Stores n8n workflows, credentials, and execution history.
  #           This is the most critical volume — losing it means losing
  #           all configured workflows and credentials.
  n8n_data:
    driver: local

  # postgres_data: Stores the n8n internal PostgreSQL database files.
  #                Contains workflow definitions, credential encryption
  #                keys, and execution logs.
  postgres_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  # agentos_network: Isolated bridge network for inter-service communication.
  #                  Services can reach each other by service name (DNS).
  agentos_network:
    driver: bridge

# ============================================================================
# PRODUCTION REVERSE PROXY SETUP (Recommended)
# ============================================================================
# For production deployments, place n8n behind a reverse proxy with SSL.
# Options:
#
# 1. Traefik (recommended, auto-SSL with Let's Encrypt):
#    Add labels to the n8n service:
#      labels:
#        - "traefik.enable=true"
#        - "traefik.http.routers.n8n.rule=Host(`your-domain.com`)"
#        - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
#        - "traefik.http.services.n8n.loadbalancer.server.port=5678"
#    And run a traefik container alongside.
#
# 2. Nginx (manual SSL certificate management):
#    Install nginx on the host and proxy_pass to localhost:5678.
#    Use certbot for Let's Encrypt certificates.
#
# 3. Cloudflare Tunnel (simplest, no port exposure):
#    Use cloudflared to tunnel traffic without opening any ports.
#
# HTTPS IS REQUIRED FOR WEBHOOKS: n8n webhooks receiving data from external
# services (Supabase webhooks, GitHub, etc.) must use HTTPS.
#
# BASIC AUTH: Always enable N8N_BASIC_AUTH_ACTIVE=true in production to
#             prevent unauthorized access to the n8n web UI.
#
# FIREWALL:   Restrict port 5678 to your IP only, or block it entirely
#             when using a reverse proxy (only expose 80/443).
# ============================================================================
