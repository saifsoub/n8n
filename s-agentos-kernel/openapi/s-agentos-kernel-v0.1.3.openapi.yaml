openapi: 3.1.0
info:
  title: S/ AgentOS Kernel Command API
  version: 0.1.3
  description: >
    GPT Actions and API-client contract for S/ AgentOS Kernel v0.1.3.
servers:
  - url: https://YOUR_N8N_PUBLIC_DOMAIN
    description: Replace with your public n8n base URL, without a trailing slash.
security:
  - AgentOSOperatorKey: []
  - BearerAuth: []
paths:
  /webhook/s-agentos-command:
    post:
      operationId: sendAgentOSCommand
      summary: Send a command to the S/ AgentOS command gateway
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SAgentOSCommand"
      responses:
        "200":
          description: Gateway response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SAgentOSResponse"
        "400":
          description: Validation or unsupported action
        "401":
          description: Unauthorized
  /webhook/s-agentos-registry:
    post:
      operationId: manageAgentRegistry
      summary: Direct agent registry service endpoint
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegistryOperation"
      responses:
        "200":
          description: Registry response
components:
  securitySchemes:
    AgentOSOperatorKey:
      type: apiKey
      in: header
      name: X-AgentOS-Key
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    SAgentOSCommand:
      type: object
      additionalProperties: false
      required: [action, objective]
      properties:
        action:
          type: string
          enum: [health_check, create_agent, execute_task, evaluate_agent, evolve_agent, registry_sync, telemetry_log, list_agents, get_agent, update_agent_status]
        objective:
          type: string
          minLength: 1
        requested_by:
          type: string
          default: operator
        priority:
          type: string
          enum: [low, normal, medium, high, urgent, critical]
          default: normal
        agent_id:
          type: string
          nullable: true
        run_mode:
          type: string
          enum: [draft, dry_run, execute]
          default: draft
        context:
          type: object
          additionalProperties: true
          default: {}
        metadata:
          type: object
          additionalProperties: true
          default: {}
    AgentRegistryOperation:
      type: object
      additionalProperties: false
      required: [operation]
      properties:
        operation:
          type: string
          enum: [create, list, get, update_status]
        agent_id:
          type: string
          nullable: true
        new_status:
          type: string
          nullable: true
        agent_data:
          type: object
          additionalProperties: true
          default: {}
    SAgentOSResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        route:
          type: string
        command_id:
          type: string
    SAgentOSError:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
        message:
          type: string
        code:
          type: integer
