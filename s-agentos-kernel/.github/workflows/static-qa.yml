name: S/ AgentOS Static QA

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  static-qa:
    name: Static QA — v0.2.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON schemas
        run: python3 scripts/validate-schemas.py

      - name: Secret scan
        run: python3 scripts/secret-scan.py

      - name: Workflow lint
        run: python3 scripts/workflow-lint.py

      - name: Static QA suite
        run: python3 scripts/static-qa.py

      - name: Curl test bash syntax
        run: bash -n tests/curl-tests.sh

      - name: Validate all JSON files
        run: |
          for f in schemas/*.json workflows/*.json; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || (echo "FAIL: $f" && exit 1)
          done
